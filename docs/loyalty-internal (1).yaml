openapi: 3.0.3
info:
  title: Loyalty Internal API
  version: "0.1.0"
  description: |
    Internal Loyalty Earn & Burn API exposing wallet, ledger, rule and reversal workflows.
servers:
  - url: https://api.example.com/internal/loyalty
    description: Production
  - url: https://staging-api.example.com/internal/loyalty
    description: Staging
tags:
  - name: Earn
    description: Earn rule evaluation and wallet crediting
  - name: Burn
    description: FIFO consumption and debit operations
  - name: Balance
    description: Wallet balances and ledger views
  - name: Reversal
    description: Safe reversal of earn/burn
  - name: Rules
    description: Rule engine management
paths:
  /earn:
    post:
      tags: [Earn]
      summary: Earn loyalty points
      operationId: earnPoints
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EarnPointsRequest'
      responses:
        '200':
            description: Earn processed
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/EarnPointsResponseWrapper'
        '409':
            description: Duplicate idempotent request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ApiErrorResponse'
  /burn:
    post:
      tags: [Burn]
      summary: Burn loyalty points
      operationId: burnPoints
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BurnPointsRequest'
      responses:
        '200':
          description: Burn processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BurnPointsResponseWrapper'
        '400':
          description: Insufficient points
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /balance/{accountNumber}:
    get:
      tags: [Balance]
      summary: Retrieve wallet balance
      operationId: getBalance
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: accountNumber
          in: path
          required: true
          schema:
            type: string
        - name: externalAccount
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Current balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoyaltyBalanceResponseWrapper'
  /transactions:
    get:
      tags: [Balance]
      summary: List wallet transactions
      operationId: listTransactions
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: accountNumber
          in: query
          required: true
          schema:
            type: string
        - name: externalAccount
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Transaction page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoyaltyTransactionPageResponse'
  /reverse:
    post:
      tags: [Reversal]
      summary: Reverse a loyalty transaction
      operationId: reverseTransaction
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReversePointsRequest'
      responses:
        '200':
          description: Reversal processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReversePointsResponseWrapper'
  /rules:
    get:
      tags: [Rules]
      summary: List loyalty rules
      operationId: listRules
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
      responses:
        '200':
          description: Rule list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoyaltyRuleListResponse'
    post:
      tags: [Rules]
      summary: Create or update a loyalty rule
      operationId: createRule
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoyaltyRuleRequest'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoyaltyRuleResponseWrapper'
        '200':
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoyaltyRuleResponseWrapper'
  /metrics/rules:
    get:
      tags: [Rules]
      summary: Rule performance metrics
      operationId: getRuleMetrics
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Aggregated metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleMetricsResponseWrapper'
  /idempotency:
    get:
      tags: [Operations]
      summary: Inspect idempotent response
      operationId: getIdempotencyRecord
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: accountNumber
          in: query
          required: true
          schema:
            type: string
        - name: externalAccount
          in: query
          required: false
          schema:
            type: string
        - name: idempotencyKey
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cached idempotent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdempotencyRecordResponseWrapper'
        '404':
          description: Record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
components:
  parameters:
    CorrelationIdHeader:
      name: X-Correlation-Id
      in: header
      schema:
        type: string
      required: false
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      schema:
        type: string
      required: true
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          description: Envelope payload
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object
    ApiErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
      properties:
        errors:
          type: array
          items:
            type: string
    EarnPointsRequest:
      type: object
      required: [accountNumber, eventType, transactionAmount, referenceId, channel]
      properties:
        accountNumber:
          type: string
        externalAccount:
          type: string
        eventType:
          type: string
        transactionAmount:
          type: number
          format: double
          minimum: 0
        referenceId:
          type: string
        referenceType:
          type: string
        channel:
          type: string
        attributes:
          type: object
          additionalProperties: {}
        partnerId:
          type: string
          description: Partner identifier to scope applicable rules
    BurnPointsRequest:
      type: object
      required: [accountNumber, points, referenceId, channel]
      properties:
        accountNumber:
          type: string
        externalAccount:
          type: string
        points:
          type: integer
          minimum: 1
        referenceId:
          type: string
        referenceType:
          type: string
        channel:
          type: string
        metadata:
          type: object
    ReversePointsRequest:
      type: object
      required: [transactionId, reason]
      properties:
        transactionId:
          type: integer
          format: int64
        reason:
          type: string
        metadata:
          type: string
    LoyaltyRuleRequest:
      type: object
      required: [code, name, ruleType, eventType, rewardType, rewardValue, status]
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        ruleType:
          type: string
          enum: [TRANSACTION_EVENT, BEHAVIOURAL, PROMOTIONAL]
        eventType:
          type: string
        rewardType:
          type: string
          enum: [FIXED, MULTIPLIER, PERCENTAGE, TIERED]
        rewardValue:
          type: number
          format: double
        multiplier:
          type: number
          format: double
        minEventValue:
          type: number
          format: double
        maxPointsPerTxn:
          type: integer
        priority:
          type: integer
        status:
          type: string
          enum: [DRAFT, ACTIVE, INACTIVE, ARCHIVED]
        appliesFrom:
          type: string
          format: date-time
        appliesTo:
          type: string
          format: date-time
        partnerId:
          type: string
        maxPointsDaily:
          type: integer
        maxPointsWeekly:
          type: integer
        maxPointsMonthly:
          type: integer
        blackoutFrom:
          type: string
          format: date-time
        blackoutTo:
          type: string
          format: date-time
        criteriaExpression:
          type: object
        rewardPayload:
          type: object
    EarnPointsResponse:
      type: object
      properties:
        transactionId:
          type: integer
          format: int64
        pointsEarned:
          type: integer
        balanceAfter:
          type: integer
        bucketIds:
          type: array
          items:
            type: integer
            format: int64
    BurnPointsResponse:
      type: object
      properties:
        transactionId:
          type: integer
          format: int64
        pointsBurned:
          type: integer
        balanceAfter:
          type: integer
        bucketConsumption:
          type: object
          additionalProperties:
            type: integer
    LoyaltyBalanceResponse:
      type: object
      properties:
        loyaltyAccountId:
          type: integer
          format: int64
        balance:
          type: integer
        lifetimeEarned:
          type: integer
        lifetimeBurned:
          type: integer
        lifetimeExpired:
          type: integer
        lastActivityAt:
          type: string
          format: date-time
        expiringSoon:
          type: object
          additionalProperties:
            type: integer
          description: Points that expire within each configured lookahead window (key = days)
    LoyaltyTransactionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        transactionType:
          type: string
          enum: [EARN, BURN, REVERSAL_EARN, REVERSAL_BURN, EXPIRY, ADJUSTMENT]
        transactionStatus:
          type: string
          enum: [PENDING, COMPLETED, FAILED, REVERSED]
        pointsDelta:
          type: integer
        pointsBefore:
          type: integer
        pointsAfter:
          type: integer
        referenceId:
          type: string
        referenceType:
          type: string
        channel:
          type: string
        occurredAt:
          type: string
          format: date-time
        metadata:
          type: object
    ReversePointsResponse:
      type: object
      properties:
        reversalTransactionId:
          type: integer
          format: int64
        reversalType:
          type: string
        pointsRestored:
          type: integer
        processedAt:
          type: string
          format: date-time
    LoyaltyRuleResponse:
      allOf:
        - $ref: '#/components/schemas/LoyaltyRuleRequest'
      properties:
        id:
          type: integer
          format: int64
    RuleMetricsResponse:
      type: object
      properties:
        ruleId:
          type: integer
          format: int64
        ruleCode:
          type: string
        ruleName:
          type: string
        totalPointsOriginal:
          type: integer
        totalPointsRemaining:
          type: integer
        expiredPoints:
          type: integer
        bucketCount:
          type: integer
        windowFrom:
          type: string
          format: date-time
        windowTo:
          type: string
          format: date-time
    IdempotencyRecordResponse:
      type: object
      properties:
        loyaltyAccountId:
          type: integer
          format: int64
        idempotencyKey:
          type: string
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        response:
          type: object
          additionalProperties: {}
    EarnPointsResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
      properties:
        data:
          $ref: '#/components/schemas/EarnPointsResponse'
    BurnPointsResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
      properties:
        data:
          $ref: '#/components/schemas/BurnPointsResponse'
    LoyaltyBalanceResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
      properties:
        data:
          $ref: '#/components/schemas/LoyaltyBalanceResponse'
    ReversePointsResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
      properties:
        data:
          $ref: '#/components/schemas/ReversePointsResponse'
    LoyaltyRuleResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
      properties:
        data:
          $ref: '#/components/schemas/LoyaltyRuleResponse'
    RuleMetricsResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/RuleMetricsResponse'
    IdempotencyRecordResponseWrapper:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
      properties:
        data:
          $ref: '#/components/schemas/IdempotencyRecordResponse'
    LoyaltyRuleListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LoyaltyRuleResponse'
    LoyaltyTransactionPageResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
      properties:
        data:
          type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/LoyaltyTransactionResponse'
            pageNumber:
              type: integer
            pageSize:
              type: integer
            totalElements:
              type: integer
            totalPages:
              type: integer
